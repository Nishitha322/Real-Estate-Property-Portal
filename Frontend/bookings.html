<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bookings — EstateHub</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header class="navbar" id="navbar"></header>

  <section class="section">
    <div class="container">
      <h1 style="margin-bottom:.25rem">Property Visit Booking</h1>
      <p class="text-muted mb-4">Schedule a visit to inspect a property with one of our agents.</p>
      <div class="grid" style="grid-template-columns:1fr 1fr;gap:2rem;align-items:start">
        <div class="form-card">
          <h3 class="mb-3">Book a Visit</h3>
          <div id="alertBox"></div>
          <form id="bookingForm">
            <div class="form-group">
              <label for="customer_name">Customer Name</label>
              <input type="text" id="customer_name" class="form-control" required>
            </div>
            <div class="form-group">
              <label for="property_id">Property</label>
              <select id="property_id" class="form-control" required></select>
            </div>
            <div class="form-row">
              <div class="form-group">
                <label for="visit_date">Visit Date</label>
                <input type="date" id="visit_date" class="form-control" required>
              </div>
              <div class="form-group">
                <label for="visit_time">Visit Time</label>
                <input type="time" id="visit_time" class="form-control" value="11:00" required>
              </div>
            </div>
            <div class="form-group">
              <label for="agent_name">Agent</label>
              <select id="agent_name" class="form-control"></select>
            </div>
            <button type="submit" class="btn btn-primary btn-block">Confirm Booking</button>
          </form>
        </div>
        <div>
          <h3 class="mb-3">Your Bookings</h3>
          <div id="bookingsList"><div class="spinner"></div></div>
        </div>
      </div>
    </div>
  </section>

  <footer class="footer" id="footer"></footer>
  <script src="script.js"></script>
  <script>
    let properties = [], agents = [];
    const user = auth.current();

    async function load() {
      try {
        [properties, agents] = await Promise.all([api.get("/properties/"), api.get("/agents/")]);
        fillForm();
        loadBookings();
      } catch (err) {
        document.getElementById("alertBox").innerHTML = `<div class="alert alert-error">${ui.escape(err.message)}</div>`;
      }
    }

    function fillForm() {
      const propSel = document.getElementById("property_id");
      propSel.innerHTML = properties.map((p) => `<option value="${p.property_id}">${ui.escape(p.property_title)} — ${ui.escape(p.location)}</option>`).join("");
      const agentSel = document.getElementById("agent_name");
      agentSel.innerHTML = '<option value="">Any agent</option>' + agents.map((a) => `<option>${ui.escape(a.agent_name)}</option>`).join("");
      if (user) document.getElementById("customer_name").value = user.full_name;
      const pid = ui.qs("property_id");
      if (pid) propSel.value = pid;
      const tomorrow = new Date(Date.now() + 86400000).toISOString().split("T")[0];
      document.getElementById("visit_date").min = new Date().toISOString().split("T")[0];
      document.getElementById("visit_date").value = tomorrow;
    }

    document.getElementById("bookingForm").addEventListener("submit", async (e) => {
      e.preventDefault();
      const box = document.getElementById("alertBox");
      const property = properties.find((p) => p.property_id == document.getElementById("property_id").value);
      const data = {
        customer_name: document.getElementById("customer_name").value.trim(),
        property_title: property.property_title,
        visit_date: document.getElementById("visit_date").value,
        visit_time: document.getElementById("visit_time").value,
        agent_name: document.getElementById("agent_name").value,
        booking_status: "Scheduled",
      };
      try {
        await api.post("/bookings/add/", data);
        ui.toast("Visit booked successfully");
        e.target.reset();
        fillForm();
        loadBookings();
      } catch (err) {
        box.innerHTML = `<div class="alert alert-error">${ui.escape(err.message)}</div>`;
      }
    });

    async function loadBookings() {
      const list = document.getElementById("bookingsList");
      try {
        const bookings = await api.get("/bookings/", user ? { customer: user.full_name } : {});
        if (bookings.length === 0) {
          list.innerHTML = '<div class="empty-state"><div class="icon">📅</div><p>No bookings yet.</p></div>';
          return;
        }
        list.innerHTML = bookings.map((b) => `
          <div class="stat-card mb-2">
            <div class="flex items-center justify-between mb-1">
              <strong>${ui.escape(b.property_title)}</strong>
              ${ui.chip(b.booking_status)}
            </div>
            <div class="text-sm text-muted">📅 ${b.visit_date} at ${b.visit_time}</div>
            <div class="text-sm text-muted">Agent: ${ui.escape(b.agent_name || "Unassigned")}</div>
            <div class="row-actions mt-2">
              <button class="btn btn-secondary btn-sm" onclick="updateStatus(${b.booking_id},'Completed')">Complete</button>
              <button class="btn btn-secondary btn-sm" onclick="updateStatus(${b.booking_id},'Cancelled')">Cancel</button>
              <button class="btn btn-danger btn-sm" onclick="removeBooking(${b.booking_id})">Delete</button>
            </div>
          </div>
        `).join("");
        window.updateStatus = async (id, status) => {
          try { await api.put(`/bookings/update/${id}/`, { booking_status: status }); ui.toast("Booking updated"); loadBookings(); }
          catch (err) { ui.toast(err.message, "error"); }
        };
        window.removeBooking = async (id) => {
          try { await api.del(`/bookings/delete/${id}/`); ui.toast("Booking deleted"); loadBookings(); }
          catch (err) { ui.toast(err.message, "error"); }
        };
      } catch (err) {
        list.innerHTML = `<div class="empty-state"><p>${ui.escape(err.message)}</p></div>`;
      }
    }

    load();
  </script>
</body>
</html>
