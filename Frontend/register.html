<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register — EstateHub</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header class="navbar" id="navbar"></header>

  <div class="auth-wrap">
    <aside class="auth-aside">
      <h2>Join EstateHub</h2>
      <p>Create your free account to search properties, schedule visits, and send inquiries to our agents.</p>
    </aside>
    <main class="auth-main">
      <div class="form-card">
        <h2 style="margin-bottom:.25rem">Create account</h2>
        <p class="text-muted mb-3">Fill in your details to get started.</p>
        <div id="alertBox"></div>
        <form id="registerForm">
          <div class="form-group">
            <label for="full_name">Full Name</label>
            <input type="text" id="full_name" class="form-control" placeholder="Rahul Sharma" required>
          </div>
          <div class="form-group">
            <label for="email">Email</label>
            <input type="email" id="email" class="form-control" placeholder="you@example.com" required>
          </div>
          <div class="form-row">
            <div class="form-group">
              <label for="phone">Phone</label>
              <input type="tel" id="phone" class="form-control" placeholder="9876543210" required>
            </div>
            <div class="form-group">
              <label for="city">City</label>
              <input type="text" id="city" class="form-control" placeholder="Hyderabad" required>
            </div>
          </div>
          <div class="form-group">
            <label for="password">Password</label>
            <input type="password" id="password" class="form-control" placeholder="••••••••" required>
          </div>
          <button type="submit" class="btn btn-primary btn-block">Register</button>
        </form>
        <p class="text-center text-muted text-sm mt-3">
          Already have an account? <a href="login.html">Login</a>
        </p>
      </div>
    </main>
  </div>

  <script src="script.js"></script>
  <script>
    document.getElementById("registerForm").addEventListener("submit", async (e) => {
      e.preventDefault();
      const box = document.getElementById("alertBox");
      const data = {
        full_name: document.getElementById("full_name").value.trim(),
        email: document.getElementById("email").value.trim(),
        phone: document.getElementById("phone").value.trim(),
        city: document.getElementById("city").value.trim(),
        password: document.getElementById("password").value,
      };
      try {
        const user = await auth.register(data);
        localStorage.setItem("realestate_user", JSON.stringify(user));
        ui.toast("Account created. Welcome!");
        setTimeout(() => location.href = "customer_dashboard.html", 600);
      } catch (err) {
        box.innerHTML = `<div class="alert alert-error">${ui.escape(err.message)}</div>`;
      }
    });
  </script>
</body>
</html>
